<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Under Maintenance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --amber: #F5A524;
    --amber-soft: #FFC94A;
    --steel: #8A97A6;
    --bg-0: #0B0E13;
    --bg-1: #141922;
    --text-hi: #F4F6F8;
    --text-mid: #A9B2BD;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  html, body{
    width:100%; height:100%;
    background: radial-gradient(ellipse 70% 60% at 50% 30%, rgba(245,165,36,0.08), transparent 60%),
                linear-gradient(180deg, var(--bg-0), var(--bg-1));
    color: var(--text-hi);
    font-family:'Inter', sans-serif;
    overflow:hidden;
  }

  .stage{
    width:100%; height:100vh;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:48px;
    position:relative;
  }

  /* faint grid backdrop, gives an industrial/blueprint feel */
  .grid-bg{
    position:absolute; inset:0; z-index:0; pointer-events:none; opacity:0.06;
    background-image:
      linear-gradient(var(--steel) 1px, transparent 1px),
      linear-gradient(90deg, var(--steel) 1px, transparent 1px);
    background-size: 48px 48px;
  }

  .engine-wrap{
    position:relative;
    width:280px; height:220px;
    display:flex; align-items:center; justify-content:center;
    z-index:1;
  }

  .gear{
    position:absolute;
    border-radius:50%;
    background: linear-gradient(160deg, #2a323e, #171b22);
    box-shadow: inset 0 2px 6px rgba(255,255,255,0.08), inset 0 -3px 8px rgba(0,0,0,0.5), 0 6px 18px rgba(0,0,0,0.45);
  }
  .gear::before{
    content:'';
    position:absolute; inset:0;
    border-radius:50%;
    background: repeating-conic-gradient(
      #171b22 0deg 12deg,
      #2a323e 12deg 24deg
    );
    mask: radial-gradient(circle, transparent 58%, #000 60%, #000 100%);
    -webkit-mask: radial-gradient(circle, transparent 58%, #000 60%, #000 100%);
  }
  .gear::after{
    content:'';
    position:absolute; inset:20%;
    border-radius:50%;
    background: linear-gradient(160deg, #1c212a, #0f1218);
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.6);
  }
  .gear .hub{
    position:absolute; inset:0; margin:auto;
    width:22%; height:22%; top:39%; left:39%;
    border-radius:50%;
    background: var(--amber);
    box-shadow: 0 0 14px 3px rgba(245,165,36,0.55);
  }

  .gear-lg{ width:150px; height:150px; top:8px; left:8px; animation: spin-cw 9s linear infinite; }
  .gear-md{ width:96px; height:96px; top:70px; left:130px; animation: spin-ccw 6s linear infinite; }
  .gear-sm{ width:62px; height:62px; top:6px; left:172px; animation: spin-cw 4s linear infinite; }

  @keyframes spin-cw{ to{ transform: rotate(360deg); } }
  @keyframes spin-ccw{ to{ transform: rotate(-360deg); } }

  .glow-ring{
    position:absolute; width:280px; height:220px; border-radius:50%;
    background: radial-gradient(circle, rgba(245,165,36,0.14), transparent 70%);
    filter: blur(20px);
    z-index:0;
    animation: pulse 3s ease-in-out infinite;
  }
  @keyframes pulse{ 0%,100%{ opacity:0.6; } 50%{ opacity:1; } }

  .text-block{
    text-align:center;
    z-index:1;
    display:flex; flex-direction:column; align-items:center; gap:14px;
  }

  .status-pill{
    display:inline-flex; align-items:center; gap:8px;
    padding:7px 16px; border-radius:999px;
    background: rgba(245,165,36,0.1);
    border:1px solid rgba(245,165,36,0.3);
    font-size:12.5px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase;
    color: var(--amber-soft);
  }
  .status-pill .dot{
    width:7px; height:7px; border-radius:50%;
    background: var(--amber);
    box-shadow: 0 0 8px 2px rgba(245,165,36,0.8);
    animation: pulse 1.6s ease-in-out infinite;
  }

  h1{
    font-family:'Manrope', sans-serif;
    font-weight:800;
    font-size: clamp(28px, 5vw, 44px);
    letter-spacing:-0.01em;
    color: var(--text-hi);
  }

  p{
    color: var(--text-mid);
    font-size:15px;
    max-width:380px;
    line-height:1.6;
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation: none !important; }
  }

  @media (max-width: 480px){
    .engine-wrap{ width:220px; height:180px; transform: scale(0.85); }
  }
</style>
</head>
<body>

<div class="stage">
  <div class="grid-bg"></div>

  <div class="engine-wrap">
    <div class="glow-ring"></div>
    <div class="gear gear-lg"><div class="hub"></div></div>
    <div class="gear gear-md"><div class="hub"></div></div>
    <div class="gear gear-sm"><div class="hub"></div></div>
  </div>

  <div class="text-block">
    <span class="status-pill"><span class="dot"></span>Maintenance in progress</span>
    <h1>Under Maintenance</h1>
    <p>We're tuning things up behind the scenes. Please check back shortly — we'll be back online soon.</p>
  </div>
</div>

</body>
</html>
